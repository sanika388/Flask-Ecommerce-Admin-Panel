{% extends "layout.html" %}

{% block page_content %}
<h1 class="text-3xl font-bold text-gray-800 mb-6">Edit User: {{ user.name }}</h1>

<div class="bg-white p-6 rounded-xl shadow-card max-w-2xl">
    
    <form method="POST" action="{{ url_for('edit_user', user_id=user.id) }}" class="space-y-6">
        
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
            <input type="text" id="name" name="name" value="{{ user.name }}" required
                   class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm p-3 focus:ring-royal-purple focus:border-royal-purple">
        </div>

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
            <input type="email" id="email" name="email" value="{{ user.email }}" required
                   class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm p-3 focus:ring-royal-purple focus:border-royal-purple">
        </div>
        
        <div>
            <label for="role" class="block text-sm font-medium text-gray-700">User Role</label>
            <select id="role" name="role" required
                    class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm p-3 focus:ring-royal-purple focus:border-royal-purple">
                <option value="Admin" {% if user.role == 'Admin' %}selected{% endif %}>Admin</option>
                <option value="Staff" {% if user.role == 'Staff' %}selected{% endif %}>Staff</option>
                <option value="Customer" {% if user.role == 'Customer' %}selected{% endif %}>Customer</option>
            </select>
        </div>
        
        <p class="text-sm text-gray-500">Note: To change the password, you may need a separate "Change Password" section for security.</p>

        
        <div class="pt-4 border-t">
            <button type="submit" class="bg-green-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-green-700 transition duration-200">
                Update User
            </button>
            <a href="{{ url_for('users') }}" class="ml-4 text-gray-600 hover:text-gray-900">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
