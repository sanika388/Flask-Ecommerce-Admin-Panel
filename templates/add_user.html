{% extends "layout.html" %}

{% block page_content %}
<h1 class="text-3xl font-bold text-gray-800 mb-6">Add New User</h1>

<div class="bg-white p-6 rounded-xl shadow-card max-w-2xl">
    
    <form method="POST" action="{{ url_for('add_user') }}" class="space-y-6">
        
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
            <input type="text" id="name" name="name" required
                   class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm p-3 focus:ring-royal-purple focus:border-royal-purple">
        </div>

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
            <input type="email" id="email" name="email" required
                   class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm p-3 focus:ring-royal-purple focus:border-royal-purple">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" id="password" name="password" required
                   class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm p-3 focus:ring-royal-purple focus:border-royal-purple">
        </div>

        <div>
            <label for="role" class="block text-sm font-medium text-gray-700">User Role</label>
            <select id="role" name="role" required
                    class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm p-3 focus:ring-royal-purple focus:border-royal-purple">
                <option value="Staff">Staff</option>
                <option value="Admin">Admin</option>
                <option value="Customer">Customer</option>
            </select>
        </div>
        
        <div class="pt-4 border-t">
            <button type="submit" class="bg-royal-purple text-white font-semibold py-2 px-4 rounded-lg hover:bg-light-purple transition duration-200">
                Create User
            </button>
            <a href="{{ url_for('users') }}" class="ml-4 text-gray-600 hover:text-gray-900">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
